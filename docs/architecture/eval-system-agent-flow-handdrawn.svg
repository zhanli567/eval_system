<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Eval System 与待评测 Agent 数据流架构图</title>
  <desc id="desc">手账风 16:9 架构图，展示评测系统、待评测 Agent、chat/completion 调用、SSE type 解析、自动评估、人工标注和结果落库的关系。</desc>
  <defs>
    <pattern id="paper-lines" width="1" height="34" patternUnits="userSpaceOnUse">
      <line x1="0" y1="33" x2="1600" y2="33" stroke="#a8c4de" stroke-width="1.1" opacity="0.26"/>
    </pattern>
    <pattern id="tiny-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.4" fill="#d8c8a2" opacity="0.25"/>
    </pattern>
    <filter id="paper-grain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.045"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="wobble" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="14" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4"/>
    </filter>
    <marker id="arrow-ink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 C3.5 8.6 3.8 3.6 1 1 Z" fill="#44546a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 C3.5 8.6 3.8 3.6 1 1 Z" fill="#4f7fa6"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 C3.5 8.6 3.8 3.6 1 1 Z" fill="#60805f"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 C3.5 8.6 3.8 3.6 1 1 Z" fill="#a15d65"/>
    </marker>
    <style>
      .bg { fill: #fbf7ea; }
      .paper-shadow { fill: #e8dcc7; opacity: 0.55; }
      .ink { stroke: #44546a; stroke-linecap: round; stroke-linejoin: round; }
      .soft-ink { stroke: #708090; stroke-linecap: round; stroke-linejoin: round; }
      .frame { stroke-width: 3; filter: url(#wobble); }
      .box { stroke-width: 2.2; filter: url(#wobble); }
      .thin { stroke-width: 1.6; }
      .flow { fill: none; stroke-width: 3.1; stroke-dasharray: 10 8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-ink); }
      .flow-blue { fill: none; stroke: #4f7fa6; stroke-width: 3.3; stroke-dasharray: 12 8; marker-end: url(#arrow-blue); }
      .flow-green { fill: none; stroke: #60805f; stroke-width: 3.1; stroke-dasharray: 10 7; marker-end: url(#arrow-green); }
      .flow-red { fill: none; stroke: #a15d65; stroke-width: 3.1; stroke-dasharray: 9 8; marker-end: url(#arrow-red); }
      .label { fill: #253242; font-family: "LXGW WenKai", "Comic Sans MS", "Microsoft YaHei", "PingFang SC", sans-serif; font-weight: 700; letter-spacing: 0; }
      .text { fill: #344054; font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif; letter-spacing: 0; }
      .small { font-size: 17px; }
      .body { font-size: 20px; }
      .mid { font-size: 23px; }
      .title { font-size: 37px; font-weight: 800; }
      .note { fill: #667085; font-size: 15px; }
      .tag { font-size: 15px; font-weight: 700; }
      .mono { font-family: "Cascadia Mono", "Consolas", monospace; font-size: 16px; fill: #2f3b52; }
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="52" y="34" width="1508" height="832" rx="28" class="paper-shadow"/>
  <rect x="38" y="24" width="1508" height="832" rx="28" fill="#fffaf0" filter="url(#paper-grain)"/>
  <rect x="38" y="24" width="1508" height="832" rx="28" fill="url(#paper-lines)"/>
  <rect x="38" y="24" width="1508" height="832" rx="28" fill="url(#tiny-dots)" opacity="0.45"/>

  <!-- Spiral binding -->
  <g transform="translate(28 65)">
    <path d="M34 0 C14 7 14 29 34 36 C54 43 54 65 34 72 C14 79 14 101 34 108 C54 115 54 137 34 144 C14 151 14 173 34 180 C54 187 54 209 34 216 C14 223 14 245 34 252 C54 259 54 281 34 288 C14 295 14 317 34 324 C54 331 54 353 34 360 C14 367 14 389 34 396 C54 403 54 425 34 432 C14 439 14 461 34 468 C54 475 54 497 34 504 C14 511 14 533 34 540 C54 547 54 569 34 576 C14 583 14 605 34 612 C54 619 54 641 34 648 C14 655 14 677 34 684 C54 691 54 713 34 720" fill="none" stroke="#7b8aa0" stroke-width="5.2" stroke-linecap="round" opacity="0.82" filter="url(#wobble)"/>
    <g fill="#fffaf0" stroke="#7b8aa0" stroke-width="2.5">
      <circle cx="58" cy="19" r="10"/><circle cx="58" cy="91" r="10"/><circle cx="58" cy="163" r="10"/><circle cx="58" cy="235" r="10"/>
      <circle cx="58" cy="307" r="10"/><circle cx="58" cy="379" r="10"/><circle cx="58" cy="451" r="10"/><circle cx="58" cy="523" r="10"/>
      <circle cx="58" cy="595" r="10"/><circle cx="58" cy="667" r="10"/>
    </g>
  </g>

  <!-- Title block -->
  <g transform="translate(105 48)">
    <text x="0" y="42" class="label title">Eval System 评测系统架构图</text>
    <text x="2" y="76" class="text small">数据流向、关键特性，以及评测系统与待评测 Agent 之间的调用关系</text>
    <path d="M0 89 C180 78 300 102 484 86" fill="none" stroke="#f3bd5d" stroke-width="7" stroke-linecap="round" opacity="0.45" filter="url(#wobble)"/>
  </g>

  <!-- Decorative symbols -->
  <g class="ink" fill="none" opacity="0.68">
    <path d="M1405 61 l10 20 22 3 -16 15 4 22 -20 -10 -20 10 4 -22 -16 -15 22 -3 z" fill="#f9d97a" stroke="#a77828" stroke-width="2"/>
    <path d="M1482 128 l47 -15 -20 44 -8 -21 -19 -8 z" fill="#cdebd8" stroke="#60805f" stroke-width="2.2"/>
    <path d="M120 796 q34 -34 67 0 q-33 32 -67 0 z" fill="#d7eaf7" stroke="#4f7fa6" stroke-width="2"/>
    <circle cx="1375" cy="804" r="17" fill="#f6c8d0" stroke="#a15d65" stroke-width="2"/>
    <path d="M1366 804 h18 M1375 795 v18" stroke="#a15d65" stroke-width="3"/>
  </g>

  <!-- Left outside inputs -->
  <g transform="translate(100 156)">
    <rect x="0" y="0" width="226" height="118" rx="18" fill="#fff2c7" stroke="#c79b43" class="box ink"/>
    <text x="24" y="38" class="label mid">评测输入</text>
    <text x="24" y="72" class="text small">评测集版本 / 字段映射</text>
    <text x="24" y="100" class="text small">评估器 / 人工标签</text>
    <g transform="translate(170 20)">
      <rect x="0" y="0" width="34" height="44" rx="4" fill="#ffffff" stroke="#c79b43" stroke-width="2"/>
      <path d="M8 14 h19 M8 24 h19 M8 34 h13" stroke="#c79b43" stroke-width="2"/>
    </g>
  </g>

  <!-- Eval system frame -->
  <g id="eval-system">
    <rect x="360" y="122" width="720" height="682" rx="28" fill="#e5f2e4" stroke="#6f9568" class="frame ink"/>
    <path d="M386 168 C529 139 891 145 1054 166" fill="none" stroke="#6f9568" stroke-width="2.2" opacity="0.38" filter="url(#wobble)"/>
    <text x="398" y="164" class="label mid">评测系统 Eval System</text>
    <text x="398" y="196" class="text small">系统自己的架构边界：任务编排、调用适配、解析、评估、标注与结果追踪</text>

    <g transform="translate(392 222)">
      <rect width="298" height="116" rx="18" fill="#ffffff" stroke="#6f9568" class="box ink"/>
      <text x="22" y="34" class="label body">1. 数据与版本</text>
      <text x="22" y="65" class="text small">评测集草稿 / 发布版本</text>
      <text x="22" y="93" class="text small">字段、行、Excel 导入</text>
      <circle cx="252" cy="36" r="20" fill="#d8ecff" stroke="#4f7fa6" stroke-width="2"/>
      <path d="M241 36 h22 M252 25 v22" stroke="#4f7fa6" stroke-width="2.4"/>
    </g>

    <g transform="translate(740 222)">
      <rect width="306" height="116" rx="18" fill="#f8e8ee" stroke="#a15d65" class="box ink"/>
      <text x="22" y="34" class="label body">2. 评测任务</text>
      <text x="22" y="65" class="text small">绑定数据集版本 + Agent</text>
      <text x="22" y="93" class="text small">绑定评估器 + 标签维度</text>
      <path d="M251 31 a20 20 0 1 0 1 0 M251 18 v13 l10 6" fill="none" stroke="#a15d65" stroke-width="2.7"/>
    </g>

    <g transform="translate(392 372)">
      <rect width="298" height="144" rx="18" fill="#d7ecfa" stroke="#4f7fa6" class="box ink"/>
      <text x="22" y="34" class="label body">3. 任务执行器</text>
      <text x="22" y="65" class="text small">事务提交后异步执行</text>
      <text x="22" y="93" class="text small">构造 messages 入参</text>
      <text x="22" y="121" class="text small">单样本失败不打断全局</text>
      <path d="M244 36 c18 0 30 12 30 28 s-12 28-30 28 -30-12-30-28 12-28 30-28z" fill="#ffffff" stroke="#4f7fa6" stroke-width="2"/>
      <path d="M244 20 v18 M244 92 v18 M216 64 h-18 M290 64 h-18 M224 43 l-13-13 M265 85 l13 13 M264 43 l13-13 M224 85 l-13 13" stroke="#4f7fa6" stroke-width="2"/>
    </g>

    <g transform="translate(740 372)">
      <rect width="306" height="144" rx="18" fill="#fff3c9" stroke="#c79b43" class="box ink"/>
      <text x="22" y="34" class="label body">4. 调用适配层</text>
      <text x="22" y="61" class="mono">POST /chat/completion</text>
      <text x="22" y="88" class="text small">stream=true</text>
      <text x="22" y="113" class="text small">携带 conversationId</text>
      <text x="22" y="137" class="text small">Cookie / x-space-id / alias</text>
      <path d="M266 28 l26 12 -26 12 6-12z" fill="#ffffff" stroke="#c79b43" stroke-width="2.2"/>
    </g>

    <g transform="translate(392 548)">
      <rect width="306" height="172" rx="18" fill="#edf7e8" stroke="#6f9568" class="box ink"/>
      <text x="22" y="34" class="label body">5. SSE 解析与输出归一</text>
      <text x="22" y="62" class="text small">读取 data: 行，跳过 [DONE]</text>
      <text x="22" y="88" class="text small">解析 choices[].delta.content</text>
      <text x="22" y="114" class="text small">按 type 聚合输出：</text>
      <text x="22" y="140" class="mono">debug / reasoning / text / error</text>
      <text x="22" y="164" class="mono">rawText / answer</text>
      <path d="M270 44 c14 7 14 28 0 35 c-14-7-14-28 0-35z" fill="#ffffff" stroke="#6f9568" stroke-width="2" opacity="0.72"/>
      <circle cx="270" cy="62" r="6" fill="#6f9568" opacity="0.72"/>
    </g>

    <g transform="translate(740 548)">
      <rect width="306" height="172" rx="18" fill="#ffffff" stroke="#6f9568" class="box ink"/>
      <text x="22" y="34" class="label body">6. 评估与沉淀</text>
      <text x="22" y="66" class="text small">LLM 评估器调用模型对话</text>
      <text x="22" y="94" class="text small">解析 score / reason / pass</text>
      <text x="22" y="122" class="text small">人工标签：annotation_pending</text>
      <text x="22" y="150" class="text small">样本输出、评分、错误可追踪</text>
      <path d="M266 46 h28 v38 h-28z" fill="#d7ecfa" stroke="#4f7fa6" stroke-width="2"/>
      <path d="M272 58 h16 M272 70 h16 M272 82 h10" stroke="#4f7fa6" stroke-width="2"/>
    </g>

    <g transform="translate(395 744)">
      <rect width="648" height="38" rx="16" fill="#f5f1ff" stroke="#8b78ad" stroke-width="2" filter="url(#wobble)"/>
      <text x="22" y="26" class="text tag">关键特性：版本化 · 样本级状态 · 失败隔离 · 自动评估 + 人工标注 · 全链路结果追踪</text>
    </g>
  </g>

  <!-- Agent frame -->
  <g id="target-agent">
    <rect x="1162" y="228" width="330" height="388" rx="28" fill="#fde8ed" stroke="#a15d65" class="frame ink"/>
    <text x="1196" y="270" class="label mid">待评测 Agent</text>
    <text x="1196" y="302" class="text small">独立被测对象，不属于评测系统内部</text>
    <g transform="translate(1214 330)">
      <rect x="0" y="0" width="224" height="130" rx="20" fill="#ffffff" stroke="#a15d65" class="box ink"/>
      <rect x="67" y="20" width="90" height="58" rx="18" fill="#d7ecfa" stroke="#4f7fa6" stroke-width="2.3"/>
      <circle cx="93" cy="48" r="7" fill="#4f7fa6"/>
      <circle cx="130" cy="48" r="7" fill="#4f7fa6"/>
      <path d="M96 68 q17 15 34 0" fill="none" stroke="#4f7fa6" stroke-width="3" stroke-linecap="round"/>
      <path d="M112 20 v-18 M112 2 l-12-8 M112 2 l12-8" fill="none" stroke="#a15d65" stroke-width="2.4" stroke-linecap="round"/>
      <text x="32" y="109" class="text small">Agent Runtime / Tools</text>
    </g>
    <g transform="translate(1196 486)">
      <rect width="260" height="92" rx="18" fill="#fff3c9" stroke="#c79b43" class="box ink"/>
      <text x="22" y="31" class="label body">返回 SSE 流</text>
      <text x="22" y="58" class="mono">type: text</text>
      <text x="22" y="80" class="mono">reasoning / debug / error</text>
    </g>
  </g>

  <!-- Optional model evaluator -->
  <g transform="translate(1162 658)">
    <rect width="330" height="116" rx="24" fill="#d7ecfa" stroke="#4f7fa6" class="frame ink"/>
    <text x="28" y="36" class="label body">模型评估器通道</text>
    <text x="28" y="67" class="text small">LLM evaluator 渲染 prompt</text>
    <text x="28" y="91" class="text small">chat/completion</text>
    <text x="28" y="111" class="text small">返回 score / reason</text>
  </g>

  <!-- Database block -->
  <g transform="translate(104 604)">
    <rect x="0" y="0" width="222" height="150" rx="20" fill="#d7ecfa" stroke="#4f7fa6" class="box ink"/>
    <text x="24" y="36" class="label body">结果与元数据</text>
    <text x="24" y="68" class="text small">MySQL / MyBatis</text>
    <text x="24" y="96" class="text small">task_item</text>
    <text x="24" y="121" class="text small">evaluator_result</text>
    <text x="24" y="143" class="text small">tag_result</text>
    <path d="M168 42 c0-14 36-14 36 0 v46 c0 14-36 14-36 0z" fill="#ffffff" stroke="#4f7fa6" stroke-width="2"/>
    <path d="M168 42 c0 14 36 14 36 0 M168 65 c0 14 36 14 36 0" fill="none" stroke="#4f7fa6" stroke-width="2"/>
  </g>

  <!-- Flow arrows -->
  <path d="M326 214 C350 214 350 280 386 280" class="flow-green"/>
  <text x="222" y="346" class="text note">创建评测任务时选定输入、Agent、评估器和标签</text>
  <path d="M690 280 C714 280 714 280 740 280" class="flow-green"/>
  <path d="M893 338 C900 356 897 356 892 372" class="flow-green"/>
  <path d="M740 444 C720 444 715 444 690 444" class="flow-blue"/>
  <path d="M1046 444 C1088 442 1112 394 1162 396" class="flow-red"/>
  <rect x="1086" y="334" width="72" height="70" rx="13" fill="#fffaf0" stroke="#d8c1a5" stroke-width="1.8" opacity="0.94" filter="url(#wobble)"/>
  <text x="1102" y="357" class="text note">请求</text>
  <text x="1099" y="379" class="mono">POST</text>
  <text x="1092" y="399" class="text note">messages</text>
  <path d="M1162 525 C1115 525 1092 610 1046 635" class="flow-red"/>
  <rect x="1086" y="548" width="72" height="54" rx="13" fill="#fffaf0" stroke="#d8c1a5" stroke-width="1.8" opacity="0.94" filter="url(#wobble)"/>
  <text x="1102" y="570" class="text note">响应</text>
  <text x="1098" y="592" class="mono">SSE</text>
  <path d="M698 634 C720 634 720 634 740 634" class="flow-green"/>
  <path d="M891 548 C890 532 890 532 892 516" class="flow-green"/>
  <path d="M740 704 C642 728 440 730 326 690" class="flow-blue"/>
  <text x="236" y="788" class="text note">评估结果、样本输出和人工标注持续落库</text>
  <path d="M1046 618 C1098 646 1115 716 1162 716" class="flow-blue"/>

  <!-- Data packets beside the main call -->
  <g transform="translate(1083 424)">
    <rect width="70" height="78" rx="14" fill="#fffaf0" stroke="#a15d65" stroke-width="2.1" filter="url(#wobble)"/>
    <text x="16" y="30" class="mono">role</text>
    <text x="14" y="57" class="mono">user</text>
  </g>
  <g transform="translate(1083 626)">
    <rect width="70" height="96" rx="14" fill="#fffaf0" stroke="#6f9568" stroke-width="2.1" filter="url(#wobble)"/>
    <text x="12" y="29" class="mono">type</text>
    <text x="11" y="56" class="mono">text</text>
    <text x="8" y="81" class="mono">error</text>
  </g>

  <!-- Legend note -->
  <g transform="translate(103 802)">
    <rect width="1386" height="44" rx="17" fill="#ffffff" opacity="0.72" stroke="#d6c9b7" stroke-width="2" filter="url(#wobble)"/>
    <text x="22" y="29" class="text small">主链路：数据集版本 + 字段映射 → 任务异步执行 → 调用待评测 Agent → 解析 SSE type → 输出进入自动评估 / 人工标注 → 样本级结果追踪</text>
  </g>
</svg>
